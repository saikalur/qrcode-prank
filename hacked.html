<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .icon {
    font-size: 100px;
    animation: pulse 0.8s infinite;
  }
  h1 {
    color: #ff0000;
    font-size: 38px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 30px 20px;
    text-shadow: 0 0 20px #f00, 0 0 40px #f00, 0 0 80px #f00;
    animation: flicker 0.15s infinite alternate;
  }
  .sub {
    color: #0f0;
    font-size: 16px;
    margin-top: 20px;
    animation: blink 1s steps(1) infinite;
  }
  .warning {
    margin-top: 40px;
    padding: 15px 30px;
    border: 2px solid #f00;
    color: #f00;
    font-size: 14px;
    animation: borderPulse 1s infinite;
    text-align: center;
    max-width: 300px;
  }
  .disclaimer {
    position: fixed;
    bottom: 15px;
    color: #222;
    font-size: 11px;
    cursor: pointer;
  }
  .disclaimer:hover { color: #666; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  @keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.6; }
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  @keyframes borderPulse {
    0%, 100% { border-color: #f00; box-shadow: 0 0 10px #f00; }
    50% { border-color: #600; box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="icon">&#9760;</div>
  <h1>Your phone<br>has been<br>hacked</h1>
  <div class="sub">[ ALL DATA COMPROMISED ]</div>
  <div class="warning">
    SECURITY BREACH DETECTED<br>
    Remote access established<br>
    Encryption keys extracted
  </div>
  <div class="disclaimer" onclick="alert('Relax! This is just a harmless prank. Nothing was hacked.')">
    Tap here for the truth
  </div>
</body>
</html>
